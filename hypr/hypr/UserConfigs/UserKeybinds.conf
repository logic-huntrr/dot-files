# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# This is where you put your own keybinds. Be Mindful to check as well ~/.config/hypr/configs/Keybinds.conf to avoid conflict
# if you think I should replace the Pre-defined Keybinds in ~/.config/hypr/configs/Keybinds.conf , submit an issue or let me know in DC and present me a valid reason as to why, such as conflicting with global shortcuts, etc etc

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds 

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

# settings for User defaults apps - set your default terminal and file manager on this file
source= $UserConfigs/01-UserDefaults.conf

# common shortcuts
bindd = $mainMod, A, app launcher, exec, pkill rofi || true && rofi -show drun -modi drun,filebrowser,run,window
#bindd = $mainMod, B, open default browser, exec, xdg-open "https://"
bindd = $mainMod, B, open brave, exec, brave
bindd = $mainMod, D, desktop overview, exec, $scriptsDir/OverviewToggle.sh # Desktop Overview
bindd = $mainMod, Return, Open terminal, exec, $term
bindd = $mainMod, E, file manager, exec, $files
bindd = $mainMod, C, Code Editor, exec, $code
bindd = $mainMod, M, Whatsapp, exec, wasistlos
bindd = $mainMod SHIFT, M, Whatsapp, exec, pkill wasistlos
bindd = $mainMod, I, Whatsapp, exec, protonvpn-app
bindd = $mainMod SHIFT, I, Whatsapp, exec, pkill proton
bindd = $mainMod, N, Notification Panel, exec, swaync-client -t
bindd = $mainMod SHIFT, N, Clear Notification Panel, exec, swaync-client -C
bindd = $mainMod ALT, N, DND Mode, exec, swaync-client -d
bindd = $mainMod, P, Power Menu, exec, $scriptsDir/Wlogout.sh
bindd = $mainMod, Q, Quit Active Window, killactive,
bindd = $mainMod, L, lock screen, exec, $scriptsDir/LockScreen.sh
bindd = $mainMod, Escape, Clear Notification, exec, swaync-client --hide-all

# Screenshot keybindings NOTE: You may need to press Fn key as well
bindd = SHIFT, Print, screencopy (area), exec, $scriptsDir/ScreenShot.sh --copy
bindd = CTRL, Print, screenshot (area), exec, $scriptsDir/ScreenShot.sh --area
bindd = $mainMod, Print, screenshot active window, exec, $scriptsDir/ScreenShot.sh --active
bindd = ALT, Print, screenshot now, exec, $scriptsDir/ScreenShot.sh --now

# FEATURES / EXTRAS
#bindd = $mainMod SHIFT, H, help / cheat sheet, exec, $scriptsDir/KeyHints.sh
bindd = $mainMod SHIFT, R, refresh bar and menus, exec, $scriptsDir/Refresh.sh
bindd = $mainMod SHIFT, E, emoji menu, exec, $scriptsDir/RofiEmoji.sh
bindd = $mainMod SHIFT, S, web search, exec, $scriptsDir/PopupBrowser.sh
bindd = $mainMod SHIFT, G, toggle game mode, exec, $scriptsDir/GameMode.sh
bindd = $mainMod SHIFT, V, clipboard manager, exec, $scriptsDir/ClipManager.sh
bindd = $mainMod ALT, V, connect vpn, exec, $HOME/.my_scripts/proton.sh
bindd = CTRL ALT, L, Campus Wifi Login, exec, xdg-open "https://wifilogin.iitism.ac.in/status"

bindd = $mainMod, F, maximize window, fullscreen, 1
bindd = $mainMod SHIFT, F, fullscreen, fullscreen
bindd = $mainMod CTRL, F, toggle master/dwindle layout, exec, $scriptsDir/ChangeLayout.sh
bindd = $mainMod, SPACE, Float current window, togglefloating,
bindd = $mainMod ALT, SPACE, Float all windows, exec, hyprctl dispatch workspaceopt allfloat
bindd = $mainMod SHIFT, Return, DropDown terminal, exec, $scriptsDir/Dropterminal.sh $term
bindd = $mainMod ALT, Delete, Exit Hyprland, exec, hyprctl dispatch exit 0

# Waybar / Bar related
bindd = $mainMod, W, toggle waybar on/off, exec, pkill -SIGUSR1 waybar

# Blue light filter (Hyprsunset)
bindd = $mainMod SHIFT, B, toggle blue light filter, exec, $scriptsDir/Hyprsunset.sh toggle

#Wallpaper
bindd = $mainMod SHIFT, W, select wallpaper, exec, $UserScripts/WallpaperSelect.sh
bindd = $mainMod CTRL, W, wallpaper effects, exec, $UserScripts/WallpaperEffects.sh
bindd = $mainMod ALT, W, random wallpaper, exec, $UserScripts/WallpaperRandom.sh

# Cycle windows; if floating bring to top
bindd = ALT, tab, cycle next window, cyclenext
bindd = ALT, tab, bring active to top, bringactivetotop
bindd = ALT SHIFT, tab, cycle previous window, cyclenext, prev
bindd = ALT SHIFT, tab, bring active to top, bringactivetotop

# Resize windows
binded = $mainMod SHIFT, left, resize left (-50), resizeactive, -50 0
binded = $mainMod SHIFT, right, resize right (+50), resizeactive, 50 0
binded = $mainMod SHIFT, up, resize up (-50), resizeactive, 0 -50
binded = $mainMod SHIFT, down, resize down (+50), resizeactive, 0 50

# Move windows
bindd = $mainMod CTRL, left, move window left, movewindow, l
bindd = $mainMod CTRL, right, move window right, movewindow, r
bindd = $mainMod CTRL, up, move window up, movewindow, u
bindd = $mainMod CTRL, down, move window down, movewindow, d

# Swap windows
bindd = $mainMod ALT, left, swap window left, swapwindow, l
bindd = $mainMod ALT, right, swap window right, swapwindow, r
bindd = $mainMod ALT, up, swap window up, swapwindow, u
bindd = $mainMod ALT, down, swap window down, swapwindow, d

# Move focus with mainMod + arrow keys
bindd = $mainMod, left, focus left, movefocus, l
bindd = $mainMod, right, focus right, movefocus, r
bindd = $mainMod, up, focus up, movefocus, u
bindd = $mainMod, down, focus down, movefocus, d

# Workspaces related
bindd = $mainMod, tab, next workspace, workspace, m+1
bindd = $mainMod SHIFT, tab, previous workspace, workspace, m-1

# Special workspace
#bindd = $mainMod SHIFT, U, move to special workspace, movetoworkspace, special
bindd = $mainMod SHIFT, U, move into/out of special workspace, exec, $UserScripts/ToogleSpecial.sh
bindd = $mainMod, U, toggle special workspace, togglespecialworkspace, special

# FEATURES / EXTRAS (UserScripts)
bindd = $mainMod, O, toggle active window opacity, exec, hyprctl dispatch setprop active opaque toggle
bindd = $mainMod SHIFT, K, search keybinds, exec, $scriptsDir/KeyBinds.sh
bindd = $mainMod SHIFT, A, animations menu, exec, $scriptsDir/Animations.sh

# Move current workspaces to monitors (left right up or down)
#bindd = $mainMod CTRL, F9, move workspace to left monitor, movecurrentworkspacetomonitor, l
#bindd = $mainMod CTRL, F10, move workspace to right monitor, movecurrentworkspacetomonitor, r
#bindd = $mainMod CTRL, F11, move workspace to up monitor, movecurrentworkspacetomonitor, u
#bindd = $mainMod CTRL, F12, move workspace to down monitor, movecurrentworkspacetomonitor, d


# For passthrough keyboard into a VM
# bind = $mainMod ALT, P, submap, passthru
#submap = passthru
# to unbind
#bind = $mainMod ALT, P, submap, reset
#submap = reset
